services:
  schemaguard:
    build: .
    container_name: schemaguard-api
    ports:
      - "8000:8000"
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      FHIR_VERSION: ${FHIR_VERSION:-R4}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-10}
      ENABLE_GZIP: ${ENABLE_GZIP:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: schemaguard-frontend
    working_dir: /workspace/frontend
    volumes:
      - ./frontend:/workspace/frontend:rw
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      schemaguard:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: schemaguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      schemaguard:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: schemaguard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana-dashboard.json:/var/lib/grafana/dashboards/schemaguard-health-ai.json:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  locust:
    image: locustio/locust:2.24.1
    container_name: schemaguard-locust
    working_dir: /mnt/loadtests
    volumes:
      - ./:/mnt:rw
    ports:
      - "8089:8089"
    command: >
      -f /mnt/loadtests/locustfile.py
      --host http://schemaguard:8000
    depends_on:
      schemaguard:
        condition: service_healthy
    profiles: ["loadtest"]
    restart: unless-stopped
