name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Format check
        run: black --check app tests loadtests
      - name: Lint
        run: flake8 app tests loadtests
      - name: Test
        run: python -m pytest -q tests
      - name: Build Docker image
        run: docker build -t schemaguard-health-ai .

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build

  loadtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install load test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Start service
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/schemaguard.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/health && exit 0
            sleep 2
          done
          cat /tmp/schemaguard.log
          exit 1
      - name: Run Locust
        env:
          USERS: "10"
          SPAWN_RATE: "5"
          DURATION: "30s"
        run: bash loadtests/run_locust.sh http://127.0.0.1:8000
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results
          path: loadtest_results/